
 <form
    [formGroup]="taskForm"
    (ngSubmit)="updateTask()">

    <div class="modal-overlay" (click)="closeModal()">

        <div
            class="task-modal"
            (click)="$event.stopPropagation()">

            <div class="modal-header">

                <h2>Edit Task</h2>

                <button
                    type="button"
                    class="close-btn"
                    (click)="closeModal()">
                    ✕
                </button>

            </div>

            <div class="modal-body">

               <div class="detail">

                    <label for="title">Title</label>

                    <input
                        id="title"
                        type="text"
                        formControlName="title">

                    <small
                        class="error"
                        *ngIf="taskForm.get('title')?.touched &&
                            taskForm.get('title')?.hasError('required')">

                        Title is required.

                    </small>

                    <small
                        class="error"
                        *ngIf="taskForm.get('title')?.touched &&
                            taskForm.get('title')?.hasError('maxlength')">

                        Maximum 20 characters allowed.

                    </small>

               </div>



               <div class="detail">

                    <label for="description">Description</label>

                    <textarea
                        id="description"
                        rows="5"
                        formControlName="description">
                    </textarea>

                    <small
                        class="error"
                        *ngIf="taskForm.get('description')?.touched &&
                            taskForm.get('description')?.hasError('required')">

                        Description is required.

                    </small>

               </div>


                <div class="row">

                    <div class="detail">

                        <label for="priority">Priority</label>

                        <select
                            id="priority"
                            formControlName="priority">

                            <option value="">Select Priority</option>
                            <option value="LOW">Low</option>
                            <option value="MEDIUM">Medium</option>
                            <option value="HIGH">High</option>

                        </select>

                        <small
                            class="error"
                            *ngIf="taskForm.get('priority')?.touched &&
                                taskForm.get('priority')?.hasError('required')">

                            Please select a priority.

                        </small>

                    </div>

                    <div class="detail">

                        <label for="status">Status</label>

                        <select
                            id="status"
                            formControlName="status">

                            <option value="">Select Status</option>
                            <option value="PENDING">Pending</option>
                            <option value="IN PROGRESS">In Progress</option>
                            <option value="COMPLETED">Completed</option>

                        </select>

                        <small
                            class="error"
                            *ngIf="taskForm.get('status')?.touched &&
                                taskForm.get('status')?.hasError('required')">

                            Please select a status.

                        </small>

                    </div>

                </div>

                <div class="detail">

                    <label>Created</label>

                    <span class="readonly">

                        {{ selectedTask.createdAt | firestoreDate }}

                    </span>

                </div>

            </div>

            <div class="modal-footer">

                <button
                    type="button"
                    class="btn btn-danger"
                    (click)="deleteTask(selectedTask.id!)"
                    [disabled] = "deleteLoading$ | async">
                    Delete

                </button>

                <button
                    class="btn btn-primary"
                    type="submit"
                    [disabled]="taskForm.invalid || (updateLoading$|async)">

                    Save Changes

                </button>

            </div>

        </div>

    </div>

</form>
