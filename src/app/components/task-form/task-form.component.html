<div class="modal-backdrop">

    <div class="modal">

        <div class="modal-header">

            <h2>Add New Task</h2>

            <button
                class="close-btn"
                (click)="closeModal()">

                ✕

            </button>

        </div>

        <form
            [formGroup]="taskForm"
            (ngSubmit)="submit()">

            <div class="form-group">

                <label>Title</label>

                <input
                    type="text"
                    formControlName="title"
                    placeholder="Enter task title">

                <div *ngIf="taskForm.controls.title.touched && taskForm.controls.title.invalid">
        
                    <small *ngIf="taskForm.controls.title.hasError('required')" class="error-text">
                        Title is required.
                    </small>

                    <small *ngIf="taskForm.controls.title.hasError('maxlength')" class="error-text">
                        Title cannot exceed 20 characters.
                    </small>

                </div>

            </div>

            <div class="form-group">

                <label>Description</label>

                <textarea
                    rows="4"
                    formControlName="description"
                    placeholder="Task description"></textarea>

                <small
                    *ngIf="taskForm.controls.description.touched && taskForm.controls.description.invalid">

                    Description is required.

                </small>

            </div>

            <div class="row">

                <div class="form-group">

                    <label>Status</label>

                    <select formControlName="status">

                        <option>PENDING</option>
                        <option>IN PROGRESS</option>
                        <option>COMPLETED</option>

                    </select>

                    <small
                        *ngIf="taskForm.controls.status.touched && taskForm.controls.status.invalid">

                        Status is required.

                    </small>

                </div>

                <div class="form-group">

                    <label>Priority</label>

                    <select formControlName="priority">

                        <option>LOW</option>
                        <option>MEDIUM</option>
                        <option>HIGH</option>

                    </select>

                     <small
                        *ngIf="taskForm.controls.priority.touched && taskForm.controls.priority.invalid">

                        Priority is required.

                    </small>

                </div>

            </div>

            <div class="actions">

                <button
                    type="button"
                    class="btn btn-outline"
                    (click)="closeModal()"
                    [disabled]="addLoading$ | async">

                    Cancel

                </button>

                
                <button
                    type="submit"
                    class="btn btn-primary"
                    [disabled]="addLoading$ | async">

                    Add task

                </button>

            </div>

        </form>

    </div>

</div>
