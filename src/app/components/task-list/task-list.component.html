<div class="task-list">

             <span
                    class="priority"

                    {{ task.priority }}

                </span>

        </div> -->


        <div class="task-header">

            <div class="task-content">
                <h3>{{ task.title }}</h3>

                <p class="task-description">
                    {{ task.description }}
                </p>
            </div>

            <span
                class="priority"
                [ngClass]="task.priority.toLowerCase()">
                {{ task.priority }}
            </span>

        </div>

        <div class="task-footer">

            <div class="task-meta">

                <span
                class="status-badge"
                [ngClass]="{
                    pending: task.status === 'PENDING',
                    progress: task.status === 'IN PROGRESS',
                    completed: task.status === 'COMPLETED'
                }">

                {{ task.status }}

            </span>

              


            </div>

            <div class="task-actions">

                <button
                    class="btn-outline btn"
                    (click)="viewDetails(task)">

                    View Details

                </button>

               

            </div>

        </div>

    </div>

</div>
